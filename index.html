<style>
  /* ===== فقط تغييرات التنسيق (CSS) - لم يتم تغيير أي شيء في الدوال ===== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: #f3f5f9;
    padding: 6px;
    color: #222;
  }

  .container {
    max-width: 1300px;
    margin: auto;
  }

  .title {
    text-align: center;
    margin-bottom: 6px;
    font-size: 24px;
    font-weight: 700;
    color: #1d3557;
  }

  .card {
    background: #acf5e9;
    padding: 8px 10px;
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    margin-bottom: 8px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 6px;
    width: 100%;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .form-group label {
    font-size: 14px;
    font-weight: 600;
    color: #1d3557;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 7px 8px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Cairo', sans-serif;
  }
  .btn {
    border: none;
    padding: 7px 10px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    transition: .2s;
  }

  .btn-add {
    background: #75b6e2;
    color: #000;
    height: 39px;
  }
  .btn-add:hover { background: #1cb807; }

  .Refresh-btn {
    background: #f72765;
    color: #fff;
  }
.Refresh-btn:hover { background: #8b8b8b; }

  .save-btn {
    background: #2bc5b3;
    color: #000;
  }
 .save-btn:hover { background: #0baff0; }

  .delete-btn {
    background: #e63946;

  }
 .delete-btn:hover { background: #eef113; }

  .New-btn {
    background: #0a8fe7da;
    color: #000;
  }
 .New-btn:hover { background: #05d8aa; }
  .search-box {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .filters-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    height: 39px;
  }

  .buttons-row {
    display: flex;
    gap: 8px;
  }

  .search-box input,
  .search-box select {
    width: 100%;
    padding: 7px 8px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  /* ===== إصلاح عرض الجدول وشريط المجاميع ===== */
  .table-wrapper {
    overflow-x: auto;
    border-radius: 12px;
    background: transparent;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 480px;
     font-size: 14px;
  }

  th, td {
    padding: 5px 4px;
    text-align: center;
    border-bottom: 1px solid #9b9b9b;
    font-size: 14px;
  }

  th {
    background: #629cec;
    color: #000;
    font-weight: 700;
    padding: 7px 4px;
  }

  tr:hover {
    background: #f9fbff;
  }
  .action-btn {
    border: none;
    padding: 4px 8px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 11px;
    margin: 0 2px;
  }
  /* ===== شريط المجاميع - يتبع عرض الجدول تماماً ===== */
  .totals-wrapper {
    overflow-x: auto;
    margin-top: 6px;
  }

  .totals-bar {
    background: #4f94f5;
    color: #000;
    padding: 5px 8px;
    border-radius: 15px;
    margin-bottom: 4px;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
    min-width: 480px;
    width: 100%;
  }

  .totals-head,
  .totals-values {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    text-align: center;
    line-height: 1.2;
    
  }

    font-weight: 700;
    margin-bottom: 3px;
    font-size: 14px;
  }

  .totals-values {
    font-size: 14px;
    font-weight: bold;
  }

 /* ===== تقليل المسافات للهواتف فقط ===== */
@media (max-width: 640px) {
    
    /* 1. تقليل المسافات بين أعمدة الجدول */
    .table-wrapper {
        overflow-x: auto;
    }
    
    table {
        min-width: 100%;
        width: 100%;
    }
    
    /* 🔴 الأهم: تقليل padding في خلايا الجدول (المسافة بين الأعمدة) */
    th, td {
        padding: 4px 2px !important;   /* تقليل المسافة الأفقية (بين الأعمدة) */
        font-size: 11px;
    }
    
    /* تقليل المسافة في رأس الجدول */
    th {
        padding: 5px 2px !important;
    }
    
    /* تقليل عرض أزرار الإجراءات */
    .action-btn {
        padding: 2px 5px;
        font-size: 10px;
    }
    
    /* 2. تقليل المسافات في شريط المجاميع */
    .totals-wrapper {
        margin-top: 4px;        /* تقليل المسافة من الجدول إلى الشريط */
    }
    
    .totals-bar {
        padding: 3px 5px;       /* تقليل المسافة داخل الشريط */
        min-width: 100%;
    }
    
    /* تقليل المسافة بين عناصر المجاميع الثلاثة */
    .totals-head {
        margin-bottom: 2px;     /* تقليل المسافة بين العناوين والأرقام */
        font-size: 10px;
    }
    
    .totals-values {
        font-size: 12px;        /* تصغير حجم الأرقام قليلاً */
        gap: 0;                 /* إزالة أي مسافات إضافية */
    }
    
    /* تقليل المسافة بين "الراتب - المصروف - الباقي" */
    .totals-head div,
    .totals-values div {
        padding: 0 2px;
    }
}

/* للشاشات الصغيرة جداً (أقل من 400px) */
@media (max-width: 400px) {

}

    }

    }
    100% {
        transform: rotateY(360deg) scale(1);
    }
}

<script>
// ===== هذا هو الكود الأصلي بالكامل - لم يتم تغيير أي شيء في الدوال =====
let db;
let tempDeletedRow = null;
let editId = null;
window.currentUser = null;

// فتح أو إنشاء قاعدة بيانات واحدة
const request = indexedDB.open("SalaryDB", 3);

request.onupgradeneeded = function(e){
    db = e.target.result;
    if(!db.objectStoreNames.contains("transactions")){
        db.createObjectStore("transactions", {
            keyPath: "id",
            autoIncrement: true
        });
    }
    if(!db.objectStoreNames.contains("deviceStore")){
        db.createObjectStore("deviceStore", {
            keyPath: "id"
        });
    }
};

request.onsuccess = async function(e){

    db = e.target.result;

    // اقفل التطبيق أولاً مباشرة
    lockProtectedButtons();

    initDeviceID();

    loadLastEntryDate();

    loadData();

    // فحص تسجيل الدخول التلقائي
    await autoLoginCheck();

    updateAuthButton();

    checkSubscriptionStatus();

    hideLoading();
};

function generateUUID(){
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'
    .replace(/[xy]/g,function(c){
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
    });
}

function initDeviceID(){
    const tx = db.transaction("deviceStore","readwrite");
    const store = tx.objectStore("deviceStore");
    const req = store.get("deviceID");
    req.onsuccess = function(){
        if(!req.result){
            const newID = generateUUID();
            const now = new Date();
            const expiryDate = new Date(
                now.getFullYear(),
                now.getMonth()+1,
                now.getDate()+15
            );
            const expiry = expiryDate.toISOString().split("T")[0];
            store.put({
                id:"deviceID",
                value:newID,
                expiry:expiry
            });
        }
    };
}

function saveUserSession(user){
    return new Promise((resolve,reject)=>{
        const tx = db.transaction("deviceStore","readwrite");
        const store = tx.objectStore("deviceStore");
        const req = store.put({
            id:"currentUser",
            value:user
        });
        req.onsuccess = ()=>resolve(true);
        req.onerror = ()=>reject(false);
    });
}

function getUserSession(){
    return new Promise((resolve)=>{
        const tx = db.transaction("deviceStore","readonly");
        const store = tx.objectStore("deviceStore");

function loadData(){
    const table = document.querySelector("#salaryTable tbody");
    table.innerHTML = "";
    const tx = db.transaction(["transactions"], "readonly");
    const store = tx.objectStore("transactions");
    let allTransactions = [];
    store.openCursor().onsuccess = function(e){
        const cursor = e.target.result;
        if(cursor){
            allTransactions.push(cursor.value);
            cursor.continue();
        } else {
            if(allTransactions.length > 0){
                allTransactions.sort((a, b) => {
                    const dateA = convertArabicMonthToDate(a.date);
                    const dateB = convertArabicMonthToDate(b.date);
                    if(dateA === dateB){
                        return b.id - a.id;
                    }
                    return dateB.localeCompare(dateA);
                });
                const latestDateStandard = convertArabicMonthToDate(allTransactions[0].date);
                const filteredTransactions = allTransactions.filter(t => {
                    return convertArabicMonthToDate(t.date) === latestDateStandard;
                });
                let totalAmount = 0;
                let lastSalaryTotal = 0;
                filteredTransactions.forEach(d => {
                    totalAmount += Number(d.amount);
                    if(lastSalaryTotal === 0){
                        lastSalaryTotal = Number(d.salaryTotal) || 0;
                        document.getElementById("salaryTotal").value = lastSalaryTotal;
                    }
                    table.innerHTML += `
                    <tr>
                        <td>${d.amount}</td>
                        <td>${d.type}</td>
                        <td>${d.date}</td>
                        <td>
                        <button class="action-btn save-btn" onclick="editRow(${d.id}, this)">تعديل</button>
                        <button class="action-btn delete-btn" onclick="deleteRow(${d.id})">حذف</button>
                        </td>
                    </tr>`;
                });
                document.getElementById("totalSalary").innerText = lastSalaryTotal;
                document.getElementById("totalAmount").innerText = totalAmount;
                document.getElementById("totalRemaining").innerText = lastSalaryTotal - totalAmount;
            }
        }
    };
}

function convertArabicMonthToDate(text){
    const arabicMonths = {
        "يناير": "01", "فبراير": "02", "مارس": "03", "أبريل": "04",
        "مايو": "05", "يونيو": "06", "يوليو": "07", "أغسطس": "08",
        "سبتمبر": "09", "أكتوبر": "10", "نوفمبر": "11", "ديسمبر": "12"
    };
    const englishMonths = {
        "January": "01", "February": "02", "March": "03", "April": "04",
        "May": "05", "June": "06", "July": "07", "August": "08",
        "September": "09", "October": "10", "November": "11", "December": "12",
        "Jan": "01", "Feb": "02", "Mar": "03", "Apr": "04",
        "Jun": "06", "Jul": "07", "Aug": "08", "Sep": "09", "Oct": "10", "Nov": "11", "Dec": "12"
    };
    if(/^\d{4}-\d{2}$/.test(text)){
        return text;
    }
    if(/^\d{1,2}[\/-]\d{4}$/.test(text)){
        const parts = text.split(/[\/-]/);
        return `${parts[1]}-${parts[0].padStart(2,'0')}`;
    }
    if(/^\d{4}[\/-]\d{1,2}$/.test(text)){
        const parts = text.split(/[\/-]/);
        return `${parts[0]}-${parts[1].padStart(2,'0')}`;
    }
    const parts = text.split(" ");
    if(parts.length !== 2) return "2000-01";
    const monthName = parts[0];
    const year = parts[1];
    if(arabicMonths[monthName]){
        return `${year}-${arabicMonths[monthName]}`;
    }
    if(englishMonths[monthName]){
        return `${year}-${englishMonths[monthName]}`;
    }
    const monthNumber = parseInt(monthName);
    if(!isNaN(monthNumber) && monthNumber >= 1 && monthNumber <= 12){
        return `${year}-${monthNumber.toString().padStart(2,'0')}`;
    }
    return "2000-01";
}

function filterByLastMonth(){
    const tx = db.transaction(["transactions"], "readonly");
    const store = tx.objectStore("transactions");
    let allTransactions = [];
    store.openCursor().onsuccess = function(e){
        const cursor = e.target.result;
        if(cursor){
            allTransactions.push(cursor.value);
            cursor.continue();
        } else {
            if(allTransactions.length > 0){
                const latestDate = allTransactions.reduce((latest, current) => {
                    const currentDate = convertArabicMonthToDate(current.date);
                    const latestDate = convertArabicMonthToDate(latest.date);
                    return currentDate > latestDate ? current : latest;
                });
                const filteredTransactions = allTransactions.filter(t => t.date === latestDate.date);
                let totalAmount = 0;
                let lastSalaryTotal = 0;
                const rows = document.querySelectorAll("#salaryTable tbody tr");
                let rowIndex = 0;
                rows.forEach(row => {
                    if(rowIndex < filteredTransactions.length){
                        const transaction = filteredTransactions[rowIndex];
                        totalAmount += Number(transaction.amount);
                        if(lastSalaryTotal === 0){
                            lastSalaryTotal = Number(transaction.salaryTotal) || 0;
                        }
                        row.style.display = "";
                    } else {
                        row.style.display = "none";
                    }
                    rowIndex++;
                });
                document.getElementById("totalSalary").innerText = lastSalaryTotal;
                document.getElementById("totalAmount").innerText = totalAmount;
                document.getElementById("totalRemaining").innerText = lastSalaryTotal - totalAmount;
            }
        }
    };
}

function updateSubscriptionCounter(){

    const counter = document.getElementById("subscriptionCounter");

    if(!currentUser || !currentUser.endDate){
        counter.innerText = "لا يوجد اشتراك";
        return;
    }

    const today = new Date();
    const endDate = new Date(currentUser.endDate);

    const diffTime = endDate - today;

    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

    if(diffDays < 0){
        counter.innerText = "انتهى الاشتراك";
        counter.style.background = "#f8d7da";
        counter.style.color = "#842029";
        return;
    }

    counter.innerText = `الاشتراك ينتهي بعد: ${diffDays} يوم`;

    if(diffDays <= 5){
        counter.style.background = "#f8d7da";
        counter.style.color = "#842029";
    }else{
        counter.style.background = "#fff3cd";
        counter.style.color = "#856404";
    }
}

<script>
// ==========================================

let deferredPrompt;

// تسجيل Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('./service-worker.js')
            .then(function(registration) {
                console.log('✅ Service Worker registered:', registration.scope);
            })
            .catch(function(error) {

            });

}

// الاستماع لحدث التثبيت
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    console.log('✅ التطبيق جاهز للتثبيت');
    showInstallButtonInPage(); // إظهار الزر داخل الصفحة
});

// دالة إظهار زر التثبيت داخل الصفحة (في الأسفل)
function showInstallButtonInPage() {
    // تجنب إنشاء الزر أكثر من مرة
    if (document.getElementById('pwaInstallBtn')) return;
    
    // إنشاء حاوية للزر في أسفل الصفحة
    const installContainer = document.createElement('div');
    installContainer.id = 'pwaInstallContainer';
    installContainer.style.cssText = `
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        width: auto;
        text-align: center;
    `;
    
    // إنشاء الزر نفسه
    const installBtn = document.createElement('button');
    installBtn.id = 'pwaInstallBtn';
    installBtn.innerHTML = '📱 تثبيت التطبيق على الجهاز';
    installBtn.style.cssText = `
        background: linear-gradient(135deg, #0d6efd, #0a58ca);
        color: white;
        border: none;
        border-radius: 50px;
        padding: 14px 28px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        transition: all 0.3s ease;
        font-family: 'Cairo', sans-serif;
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 auto;
    `;
    
    // تأثير hover
    installBtn.onmouseover = () => {
        installBtn.style.transform = 'scale(1.05)';
        installBtn.style.boxShadow = '0 6px 20px rgba(0,0,0,0.3)';
    };
    installBtn.onmouseout = () => {
        installBtn.style.transform = 'scale(1)';
        installBtn.style.boxShadow = '0 4px 15px rgba(0,0,0,0.2)';
    };
    
    // حدث النقر للتثبيت
    installBtn.onclick = async () => {
        if (!deferredPrompt) return;
        
        // إظهار نافذة التثبيت
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        
        if (outcome === 'accepted') {
            console.log('✅ تم تثبيت التطبيق');
            // إخفاء الزر بعد التثبيت
            hideInstallButton();
            showToastMessage('🎉 تم تثبيت التطبيق بنجاح!', 'success');
        } else {
            console.log('❌ المستخدم رفض التثبيت');
        }
        deferredPrompt = null;
    };
    
    installContainer.appendChild(installBtn);
    document.body.appendChild(installContainer);
}

// دالة إخفاء زر التثبيت
function hideInstallButton() {
    const container = document.getElementById('pwaInstallContainer');
    if (container) {
        container.style.transition = 'opacity 0.3s ease';
        container.style.opacity = '0';
        setTimeout(() => {
            if (container && container.parentNode) {
                container.remove();
            }
        }, 300);
    }
}

// إذا كان التطبيق مثبتاً بالفعل، لا تظهر الزر
if (window.matchMedia('(display-mode: standalone)').matches || 
    window.navigator.standalone === true) {
    console.log('📱 التطبيق يعمل بشكل مثبت - إخفاء زر التثبيت');
    // الزر لن يظهر أصلاً لأن beforeinstallprompt لن يُطلق
}

// الاستماع لتغير حالة التثبيت (لمنع ظهور الزر بعد التثبيت)
window.addEventListener('appinstalled', () => {
    console.log('🎉 تم تثبيت التطبيق (حدث appinstalled)');
    hideInstallButton();
});

// دالة عرض رسائل منبثقة قصيرة
function showToastMessage(message, type = 'success') {
    const toast = document.createElement('div');
    toast.style.cssText = `
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: ${type === 'success' ? '#2e7d32' : '#0d6efd'};
        color: white;
        padding: 12px 24px;
        border-radius: 50px;
        z-index: 100000;
        font-weight: bold;

        font-family: 'Cairo', sans-serif;
        font-size: 14px;
        text-align: center;
        white-space: nowrap;
    `;
    toast.innerHTML = `✅ ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}
